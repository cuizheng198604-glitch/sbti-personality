<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - SBTI 人格数据</title>
<style>
:root{--bg:#0f0f1a;--panel:#13132a;--card:#1a1a2e;--border:#2d2d4a;--text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;--c:#8a8a8a;--r:#3b82f6;--s:#9333ea;--l:#f59e0b;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.8rem}
h1{font-size:1.2rem;font-weight:700;color:var(--text)}
.login-wrap{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:3rem 2rem;max-width:400px;margin:4rem auto;text-align:center}
.login-wrap h2{font-size:1.1rem;margin-bottom:1.5rem;color:var(--muted)}
.login-wrap input{width:100%;padding:0.7rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;margin-bottom:1rem;outline:none}
.login-wrap input:focus{border-color:#3b82f6}
.login-wrap button{width:100%;padding:0.7rem;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:8px;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer}
.login-wrap .err{color:#f87171;font-size:0.8rem;margin-top:0.5rem;min-height:1.2em}
.admin-wrap{display:none;padding:1.5rem;max-width:1200px;margin:0 auto}
/* 统计卡片 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.8rem;margin-bottom:1.5rem}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-card .sc-n{font-size:2rem;font-weight:900;color:#60a5fa}
.stat-card .sc-l{font-size:0.72rem;color:var(--muted);margin-top:0.2rem}
/* 稀有度分布 */
.rarity-bar-section{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.2rem}
.rbar{display:flex;height:28px;border-radius:6px;overflow:hidden;gap:2px;margin-top:0.6rem}
.rbar-seg{border-radius:4px;transition:width 0.5s;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;min-width:30px}
.rbar-legend{display:flex;gap:1rem;flex-wrap:wrap;margin-top:0.5rem;font-size:0.75rem;color:var(--muted)}
.rbar-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
/* 过滤器 */
.filter-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-row select{padding:0.4rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.8rem;outline:none}
.filter-row input{padding:0.4rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.8rem;outline:none}
.filter-btn{padding:0.4rem 1rem;background:#1e293b;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:0.78rem;cursor:pointer}
.filter-btn:hover{background:#2d3a4f;color:var(--text)}
/* 结果表格 */
.results-table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.results-table th{background:#0f0f1a;padding:0.7rem 0.8rem;text-align:left;font-size:0.72rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.results-table td{padding:0.6rem 0.8rem;font-size:0.82rem;border-bottom:1px solid rgba(45,45,74,0.5);vertical-align:middle}
.results-table tr:last-child td{border-bottom:none}
.results-table tr:hover td{background:rgba(59,130,246,0.04)}
.results-table .type-cell{font-weight:800;font-size:0.95rem;letter-spacing:0.05em}
.results-table .rarity-cell{}
.results-table .rarity-tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:12px;font-size:0.68rem;font-weight:700}
.rt-common{background:rgba(138,138,138,0.12);color:var(--c);border:1px solid var(--c)}
.rt-rare{background:rgba(59,130,246,0.12);color:var(--r);border:1px solid var(--r)}
.rt-special{background:rgba(147,51,234,0.12);color:var(--s);border:1px solid var(--s)}
.rt-legendary{background:rgba(245,158,11,0.12);color:var(--l);border:1px solid var(--l)}
.results-table .skills-cell{font-size:0.7rem;color:var(--muted);max-width:200px;line-height:1.5}
.results-table .time-cell{font-size:0.72rem;color:var(--muted);white-space:nowrap}
.results-table .del-btn{background:none;border:none;color:#f87171;font-size:0.75rem;cursor:pointer;padding:0.2rem 0.4rem;border-radius:4px}
.results-table .del-btn:hover{background:rgba(248,113,113,0.1)}
/* 分页 */
.pagination{display:flex;gap:0.4rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.page-btn{padding:0.35rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:0.78rem;cursor:pointer}
.page-btn:hover{background:#2d3a4f;color:var(--text)}
.page-btn.active{background:rgba(59,130,246,0.15);border-color:#3b82f6;color:#60a5fa}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem}
/* 清空按钮 */
.danger-btn{background:rgba(248,113,113,0.1)!important;border-color:#f87171!important;color:#f87171!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){.results-table{font-size:0.75rem}.results-table th,.results-table td{padding:0.5rem}}
</style>
</head>
<body>

<header>
  <h1>📊 SBTI 人格数据后台</h1>
  <div style="display:flex;align-items:center;gap:0.8rem">
    <span id="totalCount" style="font-size:0.8rem;color:var(--muted)">--</span>
    <button class="filter-btn" onclick="logout()">退出登录</button>
  </div>
</header>

<!-- 登录页 -->
<div id="loginPage" class="login-wrap">
  <h2>🔐 后台管理入口</h2>
  <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">登录</button>
  <div class="err" id="loginErr"></div>
  <div style="margin-top:1.5rem;font-size:0.72rem;color:#334155;text-align:center">
    默认密码: sbti-admin-2026<br>（可在环境变量 ADMIN_PASSWORD 设置）
  </div>
</div>

<!-- 管理后台 -->
<div id="adminPage" class="admin-wrap">

  <!-- 统计卡片 -->
  <div class="stats-grid">
    <div class="stat-card"><div class="sc-n" id="statTotal">0</div><div class="sc-l">总提交数</div></div>
    <div class="stat-card"><div class="sc-n" id="statLegendary">0</div><div class="sc-l">传奇 (SSR)</div></div>
    <div class="stat-card"><div class="sc-n" id="statSpecial">0</div><div class="sc-l">稀有 (SR)</div></div>
    <div class="stat-card"><div class="sc-n" id="statRare">0</div><div class="sc-l">稀有 (R)</div></div>
    <div class="stat-card"><div class="sc-n" id="statCommon">0</div><div class="sc-l">普通 (N)</div></div>
    <div class="stat-card"><div class="sc-n" id="statAvg">0</div><div class="sc-l">平均大五总分</div></div>
  </div>

  <!-- 稀有度分布条 -->
  <div class="rarity-bar-section">
    <div style="font-size:0.78rem;color:var(--muted);font-weight:600">稀有度分布</div>
    <div class="rbar" id="rbar"></div>
    <div class="rbar-legend" id="rbarLegend"></div>
  </div>

  <!-- Top 类型 -->
  <div class="rarity-bar-section">
    <div style="font-size:0.78rem;color:var(--muted);font-weight:600;margin-bottom:0.5rem">类型分布 TOP</div>
    <div id="topTypes" style="display:flex;gap:0.5rem;flex-wrap:wrap"></div>
  </div>

  <!-- 过滤 & 操作 -->
  <div class="filter-row">
    <select id="filterRarity"><option value="">全部稀有度</option><option value="Legendary">SSR 传奇</option><option value="Special">SR 稀有</option><option value="Rare">R 少见</option><option value="Common">N 普通</option></select>
    <select id="filterType"><option value="">全部类型</option></select>
    <input type="text" id="filterKeyword" placeholder="搜索关键词" style="width:140px">
    <button class="filter-btn" onclick="loadResults(1)">🔍 筛选</button>
    <button class="filter-btn" onclick="resetFilters()">重置</button>
    <button class="filter-btn danger-btn" onclick="clearAll()">🗑 清空全部</button>
  </div>

  <!-- 表格 -->
  <div style="overflow-x:auto">
    <table class="results-table">
      <thead>
        <tr>
          <th>类型</th>
          <th>稀有度</th>
          <th>角色</th>
          <th>大五总分</th>
          <th>天赋技能</th>
          <th>提交时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="resultsBody"><tr><td colspan="7" class="empty-state">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
const API = window.location.origin;
let password = '';
let allResults = [];
let currentPage = 1;
const PAGE_SIZE = 20;

function doLogin() {
  password = document.getElementById('passwordInput').value;
  if (!password) {
    document.getElementById('loginErr').textContent = '请输入密码';
    return;
  }
  document.getElementById('loginErr').textContent = '';
  fetch(API + '/api/admin/results', { headers: { 'X-Admin-Password': password } })
    .then(r => {
      if (!r.ok) throw new Error('密码错误');
      return r.json();
    })
    .then(data => {
      allResults = data.results;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      document.getElementById('totalCount').textContent = '共 ' + allResults.length + ' 条';
      populateTypeFilter();
      renderStats(data.stats);
      loadResults(1);
    })
    .catch(e => {
      document.getElementById('loginErr').textContent = '密码错误，请重试';
    });
}

function logout() {
  if (!confirm('确定退出登录？')) return;
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('passwordInput').value = '';
  allResults = [];
}

function renderStats(stats) {
  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('statLegendary').textContent = stats.by_rarity.Legendary || 0;
  document.getElementById('statSpecial').textContent = stats.by_rarity.Special || 0;
  document.getElementById('statRare').textContent = stats.by_rarity.Rare || 0;
  document.getElementById('statCommon').textContent = stats.by_rarity.Common || 0;
  document.getElementById('statAvg').textContent = stats.avg_bf_total || 0;

  // 稀有度分布条
  const total = stats.total || 1;
  const rarities = [
    { key: 'Legendary', label: 'SSR 传奇', color: '#f59e0b' },
    { key: 'Special',   label: 'SR 稀有',  color: '#9333ea' },
    { key: 'Rare',      label: 'R 少见',   color: '#3b82f6' },
    { key: 'Common',    label: 'N 普通',   color: '#8a8a8a' },
  ];
  const rbar = document.getElementById('rbar');
  const rleg = document.getElementById('rbarLegend');
  rbar.innerHTML = '';
  rleg.innerHTML = '';
  rarities.forEach(r => {
    const pct = Math.round((stats.by_rarity[r.key] || 0) / total * 100);
    if (pct > 0) {
      const seg = document.createElement('div');
      seg.className = 'rbar-seg';
      seg.style.background = r.color;
      seg.style.width = pct + '%';
      seg.textContent = pct >= 8 ? pct + '%' : '';
      rbar.appendChild(seg);
    }
    rleg.innerHTML += `<span style="color:${r.color}">● ${r.label} ${stats.by_rarity[r.key]||0}人</span>`;
  });

  // Top类型
  const topDiv = document.getElementById('topTypes');
  topDiv.innerHTML = '';
  (stats.top_types || []).forEach(t => {
    const span = document.createElement('span');
    span.style.cssText = 'background:#1a1a2e;border:1px solid #2d2d4a;padding:0.3rem 0.7rem;border-radius:20px;font-size:0.78rem;color:#60a5fa';
    span.textContent = t.type + ' ×' + t.count;
    topDiv.appendChild(span);
  });
}

function populateTypeFilter() {
  const types = [...new Set(allResults.map(r => r.sbti_type))].sort();
  const sel = document.getElementById('filterType');
  sel.innerHTML = '<option value="">全部类型</option>';
  types.forEach(t => {
    sel.innerHTML += `<option value="${t}">${t}</option>`;
  });
}

function getFiltered() {
  const rarity = document.getElementById('filterRarity').value;
  const type = document.getElementById('filterType').value;
  const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
  return allResults.filter(r => {
    if (rarity && r.rarity !== rarity) return false;
    if (type && r.sbti_type !== type) return false;
    if (kw) {
      const text = JSON.stringify(r).toLowerCase();
      if (!text.includes(kw)) return false;
    }
    return true;
  });
}

function loadResults(page) {
  currentPage = page;
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const start = (page - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('resultsBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无数据</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = pageData.map(r => {
    const dt = new Date(r.submitted_at);
    const timeStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const skillsText = (r.skills || []).map(s => typeof s === 'string' ? s : (s[0] || '')).join(' / ');
    const rarityCls = {Common:'rt-common',Rare:'rt-rare',Special:'rt-special',Legendary:'rt-legendary'}[r.rarity] || '';
    return `<tr>
      <td class="type-cell">${r.sbti_type}</td>
      <td><span class="rarity-tag ${rarityCls}">${r.rarity}</span></td>
      <td>${r.role || '-'}</td>
      <td>${r.bigfive_total || '-'}</td>
      <td class="skills-cell">${skillsText || '-'}</td>
      <td class="time-cell">${timeStr}</td>
      <td><button class="del-btn" onclick="deleteResult('${r.id}')">删除</button></td>
    </tr>`;
  }).join('');

  // 分页
  const pDiv = document.getElementById('pagination');
  pDiv.innerHTML = '';
  if (totalPages <= 1) return;
  const prev = Math.max(1, currentPage - 2);
  const next = Math.min(totalPages, currentPage + 2);
  if (currentPage > 1) pDiv.innerHTML += `<button class="page-btn" onclick="loadResults(${currentPage-1})">← 上一页</button>`;
  for (let i = prev; i <= next; i++) {
    pDiv.innerHTML += `<button class="page-btn ${i===currentPage?'active':''}" onclick="loadResults(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) pDiv.innerHTML += `<button class="page-btn" onclick="loadResults(${currentPage+1})">下一页 →</button>`;
}

function resetFilters() {
  document.getElementById('filterRarity').value = '';
  document.getElementById('filterType').value = '';
  document.getElementById('filterKeyword').value = '';
  loadResults(1);
}

function deleteResult(id) {
  if (!confirm('确定删除这条记录？')) return;
  fetch(API + '/api/admin/results/' + id, {
    method: 'DELETE',
    headers: { 'X-Admin-Password': password }
  })
    .then(r => r.json())
    .then(data => {
      allResults = allResults.filter(r => r.id !== id);
      document.getElementById('totalCount').textContent = '共 ' + allResults.length + ' 条';
      loadResults(currentPage);
    })
    .catch(() => alert('删除失败'));
}

function clearAll() {
  if (!confirm('⚠️ 确定要清空全部 ' + allResults.length + ' 条数据？此操作不可恢复！')) return;
  if (!confirm('再次确认：清空后数据无法恢复，确定继续？')) return;
  fetch(API + '/api/admin/results', {
    method: 'DELETE',
    headers: { 'X-Admin-Password': password }
  })
    .then(r => r.json())
    .then(() => {
      allResults = [];
      loadResults(1);
      document.getElementById('totalCount').textContent = '共 0 条';
      document.getElementById('rbar').innerHTML = '';
      document.getElementById('rbarLegend').innerHTML = '';
    })
    .catch(() => alert('清空失败'));
}
</script>
</body>
</html>
