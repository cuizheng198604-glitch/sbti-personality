<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动物性格测试</title>
<style>
:root{--bg:#0a0f1a;--panel:#0d1525;--card:#111d32;--border:#1e3050;--text:#e8edf5;--muted:#5a7a9a;--dim:#8ba5c0;--primary:#f59e0b;--accent:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── 封面 ── */
#startScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.start-card{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:2.5rem 2rem;max-width:520px;width:100%;text-align:center;animation:fadeUp 0.6s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.start-emoji{font-size:4rem;margin-bottom:1rem}
.start-title{font-size:1.9rem;font-weight:900;background:linear-gradient(90deg,#f59e0b,#fbbf24,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem}
.start-subtitle{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem}
.start-desc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:left;color:var(--dim);font-size:0.82rem;line-height:1.9;margin-bottom:1.5rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1.5rem;text-align:left}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem}
.info-n{font-size:0.68rem;color:var(--muted);margin-bottom:0.15rem}
.info-v{font-size:0.88rem;font-weight:700;color:var(--primary)}
.btn-group{display:flex;flex-direction:column;gap:0.6rem}
.btn-start{background:linear-gradient(135deg,#f59e0b,#fbbf24);border:none;border-radius:12px;color:#0a0f1a;font-size:1rem;font-weight:800;cursor:pointer;padding:0.85rem 2rem;letter-spacing:0.03em;transition:opacity 0.2s,transform 0.1s;box-shadow:0 4px 20px rgba(245,158,11,0.3)}
.btn-start:hover{opacity:0.9}
.btn-start:active{transform:scale(0.97)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:0.6rem 2rem;font-size:0.85rem;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{background:var(--card);color:var(--text)}

/* ── 答题页 ── */
#quizScreen{display:none;min-height:100vh}
.quiz-header{background:linear-gradient(135deg,#0d1525,#111d32);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:10}
.qh-left{display:flex;align-items:center;gap:0.8rem}
.qh-badge{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--primary);padding:0.2rem 0.6rem;border-radius:6px;font-size:0.68rem;font-weight:700}
.qh-title{font-size:0.82rem;font-weight:700;color:var(--muted)}
.progress-wrap{flex:1;max-width:400px}
.pg-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pg-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#fbbf24);border-radius:3px;transition:width 0.4s}
.pg-text{font-size:0.68rem;color:var(--muted);text-align:right;margin-top:0.18rem}
.quiz-body{padding:1.8rem 1.5rem;max-width:700px;margin:0 auto}
.q-block{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.q-meta{font-size:0.68rem;color:var(--muted);margin-bottom:0.6rem;letter-spacing:0.05em}
.q-text{font-size:0.98rem;color:var(--text);line-height:1.75;margin-bottom:1.1rem;font-weight:600}
.q-opts{display:flex;flex-direction:column;gap:0.5rem}
.q-opt{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 1rem;border:1px solid var(--border);background:var(--card);border-radius:10px;color:var(--dim);font-size:0.88rem;cursor:pointer;transition:all 0.15s;user-select:none}
.q-opt:hover{border-color:var(--primary);color:var(--text);background:rgba(245,158,11,0.05)}
.q-opt.selected{border-color:var(--primary);background:rgba(245,158,11,0.12);color:var(--primary);font-weight:600}
.q-opt .ol{font-size:1.1rem;font-weight:800;flex-shrink:0;width:28px;text-align:center;opacity:0.6}
.q-opt.selected .ol{opacity:1}
.nav-row{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-next{padding:0.65rem 2.2rem;background:linear-gradient(135deg,#f59e0b,#fbbf24);border:none;border-radius:10px;color:#0a0f1a;font-size:0.9rem;font-weight:800;cursor:pointer;transition:opacity 0.2s;box-shadow:0 2px 12px rgba(245,158,11,0.2)}
.btn-next:hover{opacity:0.88}
.btn-next:disabled{opacity:0.35;cursor:not-allowed}
.btn-back{padding:0.65rem 1.2rem;background:#111d32;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:0.9rem;cursor:pointer;transition:all 0.15s}
.btn-back:hover{background:#1e3050;color:var(--text)}

/* ── 加载页 ── */
#loadingScreen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.loading-emoji{font-size:3rem;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.loading-text{color:var(--muted);font-size:0.9rem;margin-top:1rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── 答题页广告 ── */
.ad-container{margin:0.5rem auto;max-width:700px}
.quiz-ad{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.8rem;display:flex;align-items:center;gap:0.8rem;margin:0.5rem 0}
.quiz-ad-label{background:rgba(245,158,11,0.1);color:var(--primary);padding:0.15rem 0.5rem;border-radius:4px;font-size:0.65rem;font-weight:700;flex-shrink:0}
.quiz-ad-content{display:flex;align-items:center;gap:0.8rem;flex:1}
.quiz-ad-text{font-size:0.78rem;color:var(--dim);flex:1;text-align:left}
.quiz-ad-qr{background:#fff;border-radius:6px;padding:4px;flex-shrink:0}
</style>
</head>
<body>

<!-- 封面 -->
<div id="startScreen">
  <div class="start-card">
    <div class="start-emoji" data-i18n="quiz_emoji">🐾</div>
    <h1 class="start-title" data-i18n="quiz_title">动物性格测试</h1>
    <p class="start-subtitle" data-i18n="quiz_subtitle">MBTI已过时，动物人格才是新潮流</p>
    <div class="start-desc" data-i18n-html="quiz_desc">
      基于 <strong>MBTI</strong> + <strong>Big Five</strong> 双维度人格理论，结合东方动物哲学全新设计。<br><br>
      不同动物有不同性格——<strong>龙的威严、狐狸的机智、考拉的淡定</strong>。<br>
      38道题，揭开你内心最真实的动物面孔。
    </div>
    <div class="info-grid">
      <div class="info-item"><div class="info-n" data-i18n="quiz_q_count">题目数</div><div class="info-v">38题</div></div>
      <div class="info-item"><div class="info-n" data-i18n="quiz_duration">预计用时</div><div class="info-v">5-8分钟</div></div>
      <div class="info-item"><div class="info-n" data-i18n="quiz_result_types">结果类型</div><div class="info-v">17种动物</div></div>
      <div class="info-item"><div class="info-n" data-i18n="quiz_rarity">稀有度</div><div class="info-v">4级掉落</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-start" data-i18n="quiz_start" onclick="startQuiz()">🐾 开始测试</button>
      <button class="btn-ghost" data-i18n="quiz_try" onclick="startQuiz()">好奇试试</button>
    </div>
  </div>
</div>

<!-- 答题页 -->
<div id="quizScreen">
  <div class="quiz-header">
    <div class="qh-left">
      <span class="qh-badge">MBTI × Big5</span>
      <span class="qh-title">🐾 动物性格测试</span>
    </div>
    <div class="progress-wrap">
      <div class="pg-bar"><div class="pg-fill" id="pgFill" style="width:0%"></div></div>
      <div class="pg-text" id="pgText">0 / 38</div>
    </div>
    <button class="btn-back" onclick="confirmExit()" data-i18n="quiz_exit">退出</button>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<!-- 加载页 -->
<div id="loadingScreen">
  <div class="loading-emoji">🐾</div>
  <div class="loading-text" data-i18n="quiz_loading">正在分析你的动物人格...</div>
</div>

<script src="animal_config.js?v=2" charset="UTF-8"></script>
<script src="lang.js?v=2" charset="UTF-8"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js?v=2" charset="UTF-8"></script>
<script>
(function() {
const cfg = ANIMAL_CONFIG;

// 根据语言决定使用哪套题目
const rawQuestions = cfg.questions;
const isEnglish = I18N.getLang() === 'en';
const QUESTIONS = isEnglish ? I18N.getEnglishQuestions() : rawQuestions;

let currentQ = 0;
let answers = {};
const total = QUESTIONS.length;

const BF_DIMS = ['Openness','Conscientiousness','Extraversion','Agreeableness','Neuroticism'];
const SECTION_LABELS = isEnglish
  ? { EI:'MBTI · Energy', NS:'MBTI · Awareness', FT:'MBTI · Decision', JP:'MBTI · Execution',
      O:'BigFive · Openness', C:'BigFive · Conscientiousness', E:'BigFive · Extraversion',
      A:'BigFive · Agreeableness', N:'BigFive · Neuroticism' }
  : { EI:'MBTI · 能量倾向', NS:'MBTI · 信息感知', FT:'MBTI · 决策方式', JP:'MBTI · 执行方式',
      O:'BigFive · 开放性', C:'BigFive · 尽责性', E:'BigFive · 外向性',
      A:'BigFive · 宜人性', N:'BigFive · 神经质' };

const NEXT_BTN = isEnglish ? 'Next →' : '下一题 →';
const SUBMIT_BTN = isEnglish ? '🔮 View Result' : '🔮 查看结果';
const PREV_BTN = isEnglish ? 'Previous' : '上一题';
const EXIT_CONFIRM = isEnglish
  ? 'Are you sure you want to exit? Progress will not be saved.'
  : '确定退出吗？进度将不会保存。';
const LOADING_TEXT = isEnglish ? 'Analyzing your animal personality...' : '正在分析你的动物人格...';

function getSectionLabel(q) {
  if (q.type === 'mbti') {
    if (q.dim === 'E' || q.dim === 'I') return SECTION_LABELS.EI;
    if (q.dim === 'N' || q.dim === 'S') return SECTION_LABELS.NS;
    if (q.dim === 'F' || q.dim === 'T') return SECTION_LABELS.FT;
    return SECTION_LABELS.JP;
  }
  if (q.dim === 'Openness') return SECTION_LABELS.O;
  if (q.dim === 'Conscientiousness') return SECTION_LABELS.C;
  if (q.dim === 'Extraversion') return SECTION_LABELS.E;
  if (q.dim === 'Agreeableness') return SECTION_LABELS.A;
  return SECTION_LABELS.N;
}

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion(0);
}

function showQuestion(index) {
  currentQ = index;
  const q = QUESTIONS[index];
  const body = document.getElementById('quizBody');

  document.getElementById('pgFill').style.width = ((index + 1) / total * 100) + '%';
  document.getElementById('pgText').textContent = (index + 1) + ' / ' + total;
  document.querySelector('.qh-title').textContent = isEnglish ? '🐾 Animal Personality Test' : '🐾 动物性格测试';

  body.innerHTML = `
    <div class="q-block">
      <div class="q-meta">\${getSectionLabel(q)} · \${isEnglish ? 'Q' + (index + 1) : '第'+(index+1)+'题'}</div>
      <div class="q-text">\${q.text}</div>
      <div class="q-opts">
        \${q.opts.map((o, i) => \`
          <div class="q-opt" onclick="selectOpt(\${i}, \${o.s})">
            <span class="ol">\${o.l}</span>
            <span>\${o.t}</span>
          </div>
        \`).join('')}
      </div>
    </div>
    <div class="ad-container" id="qAdContainer"></div>
    <div class="nav-row">
      \${index > 0 ? '<button class="btn-back" onclick="prevQ()">' + PREV_BTN + '</button>' : ''}
      <button class="btn-next" id="nextBtn" onclick="nextQ()" disabled>\${index === total - 1 ? SUBMIT_BTN : NEXT_BTN}</button>
    </div>
  `;

  if (answers[index] !== undefined) {
    const saved = answers[index].score;
    const opts = document.querySelectorAll('.q-opt');
    opts.forEach((opt, i) => {
      if (q.opts[i].s === saved) opt.classList.add('selected');
    });
    document.getElementById('nextBtn').disabled = false;
  }
  // 每5题显示广告
  const adContainer = document.getElementById('qAdContainer');
  if (adContainer) {
    if ((index + 1) % 5 === 0 && index < total - 1) {
      const adText = isEnglish ? 'Scan for exclusive personality analysis' : '扫码领取独家性格分析资料';
      adContainer.innerHTML = `<div class="quiz-ad">
        <div class="quiz-ad-label">\${isEnglish ? 'Ad' : '广告'}</div>
        <div class="quiz-ad-content">
          <div class="quiz-ad-text">\${adText}</div>
          <div class="quiz-ad-qr" id="quizAdQR"></div>
        </div>
      </div>`;
      setTimeout(() => {
        const qrTarget = document.getElementById('quizAdQR');
        if (qrTarget && typeof QRCode !== 'undefined') {
          qrTarget.innerHTML = '';
          new QRCode(qrTarget, { text: window.location.href.split('?')[0] || 'quiz', width: 80, height: 80, colorDark: "#ffffff", colorLight: "#0d1525" });
        }
      }, 100);
    } else {
      adContainer.innerHTML = '';
    }
  }
}

function selectOpt(index, score) {
  answers[currentQ] = { score, index };
  const opts = document.querySelectorAll('.q-opt');
  opts.forEach((o, i) => o.classList.toggle('selected', i === index));
  document.getElementById('nextBtn').disabled = false;
}

function nextQ() {
  if (currentQ < total - 1) showQuestion(currentQ + 1);
  else showResult();
}

function prevQ() {
  if (currentQ > 0) showQuestion(currentQ - 1);
}

function confirmExit() {
  if (confirm(EXIT_CONFIRM)) {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
  }
}

// ══════════════════════════════════════
//  计分引擎：MBTI + BigFive → 动物
// ══════════════════════════════════════
function calcResult() {
  // 1. 分别累计各维度总分和题数
  const mbti_scores = { E:0, I:0, N:0, S:0, F:0, T:0, J:0, P:0 };
  const mbti_counts = { E:0, I:0, N:0, S:0, F:0, T:0, J:0, P:0 };
  const bf_scores  = { Openness:0, Conscientiousness:0, Extraversion:0, Agreeableness:0, Neuroticism:0 };
  const bf_counts  = { Openness:0, Conscientiousness:0, Extraversion:0, Agreeableness:0, Neuroticism:0 };

  QUESTIONS.forEach((q, qi) => {
    const ans = answers[qi];
    if (!ans) return;
    const s = ans.score;

    if (q.type === 'mbti') {
      const dim = q.dim;
      if (s >= 4) { mbti_scores[dim] += s; mbti_counts[dim]++; }
      else if (s <= 2) {
        const opposite = {E:'I',N:'S',F:'T',J:'P'}[dim];
        mbti_scores[opposite] += (6 - s); mbti_counts[opposite]++;
      } else { mbti_scores[dim] += s; mbti_counts[dim]++; }
    } else if (q.type === 'bf') {
      bf_scores[q.dim] += s; bf_counts[q.dim]++;
    }
  });

  // 2. 算百分比
  const bf_pct = {};
  BF_DIMS.forEach(d => {
    bf_pct[d] = bf_counts[d] > 0 ? Math.round((bf_scores[d] / (bf_counts[d] * 5)) * 100) : 50;
  });

  // MBTI字母
  const mbti = ['E','N','F','J'].map(d => {
    const pos = mbti_scores[d];
    const neg = {E:'I',N:'S',F:'T',J:'P'}[d];
    const neg_score = mbti_scores[neg];
    return pos >= neg_score ? d : {E:'I',N:'S',F:'T',J:'P'}[d];
  }).join('');

  // 3. 用BigFive五维找最匹配的动物
  let bestAnimal = null;
  let bestSimilarity = -1;

  cfg.animals.forEach(animal => {
    const p = animal.profile;
    let sim = 0;
    BF_DIMS.forEach(d => {
      const diff = Math.abs(bf_pct[d] - (p[d] || 50));
      sim += (100 - diff);
    });
    sim = sim / BF_DIMS.length;
    if (sim > bestSimilarity) {
      bestSimilarity = sim;
      bestAnimal = animal;
    }
  });

  const matchPercent = Math.round(bestSimilarity);
  const rarity = bestAnimal.rarity;

  // 4. 找次要动物
  const sorted = cfg.animals.map(a => {
    const p = a.profile;
    let sim = 0;
    BF_DIMS.forEach(d => { sim += (100 - Math.abs(bf_pct[d] - (p[d]||50))); });
    return { animal: a, sim: sim / BF_DIMS.length };
  }).sort((a,b) => b.sim - a.sim);

  return {
    animalId: bestAnimal.id,
    animal: bestAnimal,
    mbti,
    matchPercent,
    rarity: cfg.rarities[rarity],
    bfScores: bf_pct,
    secondAnimal: sorted[1] ? sorted[1].animal : null,
    thirdAnimal: sorted[2] ? sorted[2].animal : null,
    allDimensions: bf_pct
  };
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  var loadingEl = document.getElementById('loadingScreen');
  loadingEl.style.display = 'flex';
  var loadingText = loadingEl.querySelector('.loading-text');
  if (loadingText) loadingText.textContent = LOADING_TEXT;

  setTimeout(() => {
    const result = calcResult();

    // 提交到后端API
    fetch('https://fbti-new.onrender.com/api/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result)
    }).catch(() => {});

    // 同时保存本地（备份）
    try {
      const history = JSON.parse(localStorage.getItem('animal_results') || '[]');
      history.unshift({ ...result, submitted_at: new Date().toISOString(), id: Date.now().toString(36) });
      if (history.length > 500) history.length = 500;
      history.unshift(result);
      if (history.length > 100) history = history.slice(0, 100);
      localStorage.setItem('animal_results', JSON.stringify(history));
    } catch(e) {}

    try { sessionStorage.setItem('animal_result', JSON.stringify(result)); } catch(e) {}
    try { localStorage.setItem('animal_last_result', JSON.stringify(result)); } catch(e) {}
    window.location.href = 'animal_result.html';
  }, 1800);
}

// Expose needed functions globally for onclick handlers
window.startQuiz = startQuiz;
window.selectOpt = selectOpt;
window.prevQ = prevQ;
window.nextQ = nextQ;
window.confirmExit = confirmExit;
window.calcResult = calcResult;

I18N.applyLang();
})();
</script>
</body>
</html>
