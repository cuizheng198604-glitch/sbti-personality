<script>
// ── 解析结果（优先 sessionStorage → localStorage → URL）──
function getResultFromURL() {
  // 优先从 sessionStorage 读取（答题流程传入）
  try {
    var stored = sessionStorage.getItem('animal_result');
    if (stored) {
      sessionStorage.removeItem('animal_result');
      return JSON.parse(stored);
    }
  } catch(e) {}

  // 从 URL 参数读取（如分享链接）
  var params = new URLSearchParams(window.location.search);
  var encoded = params.get('r');
  if (encoded) {
    try {
      return JSON.parse(atob(encoded));
    } catch(e) {}
  }

  // 最后的兜底：从 localStorage 读取最近一次结果
  try {
    var allResults = JSON.parse(localStorage.getItem('animal_results') || '[]');
    if (allResults.length > 0) return allResults[0];
  } catch(e) {}

  return getDefaultResult();
}

function getDefaultResult() {
  const animal = cfg.animals[0];
  return {
    animalId: animal.id,
    animal,
    mbti: 'INTJ',
    matchPercent: 87,
    rarity: cfg.rarities[animal.rarity],
    bfScores: { Openness: 75, Conscientiousness: 80, Extraversion: 40, Agreeableness: 60, Neuroticism: 25 },
    secondAnimal: cfg.animals[1],
    thirdAnimal: cfg.animals[2]
  };
}

var cfg = window.ANIMAL_CONFIG || { animals: [{id:'fox',name:'狐狸',emoji:'🦊',rarity:'common',traits:['聪明','灵活'],description:'狐狸',strength:'聪明',weakness:'有时狡猾',bestMatch:[],worstMatch:[],profile:{Openness:70,Conscientiousness:60,Extraversion:65,Agreeableness:55,Neuroticism:45}, share:{quizUrl:'https://www.fbti.net'}}], rarities: { common:{name:'普通',stars:1,color:'#888'}, rare:{name:'稀有',stars:3,color:'#4ade80'}, epic:{name:'史诗',stars:4,color:'#a78bfa'}, legendary:{name:'传说',stars:5,color:'#fbbf24'} }, share:{quizUrl:'https://www.fbti.net'}, ads:{enabled:false} };

// ── 语言感知的 BF_LABELS ─────────────────────
function getBFLabels(lang) {
  if (lang === 'en') {
    return {
      Openness: 'Openness', Conscientiousness: 'Conscientiousness',
      Extraversion: 'Extraversion', Agreeableness: 'Agreeableness', Neuroticism: 'Neuroticism'
    };
  }
  return {
    Openness: '开放性', Conscientiousness: '尽责性',

}

function getShareUrl(type) {
  var base = cfg.share ? cfg.share.quizUrl : window.location.href;
  // Remove any existing UTM params to avoid duplicates
  base = base.split('?')[0];
  var utm_source = 'wechat';
  var utm_medium = 'share';
  var utm_campaign = 'viral_test';
  if (type === 'save') { utm_source = 'moments'; utm_medium = 'save_image'; }
  else if (type === 'qr') { utm_source = 'qr_scan'; utm_medium = 'qr'; }
  else if (type === 'card') { utm_source = 'share_card'; utm_medium = 'card_cta'; }
  return base + '?utm_source=' + encodeURIComponent(utm_source) + '&utm_medium=' + encodeURIComponent(utm_medium) + '&utm_campaign=' + encodeURIComponent(utm_campaign);
}

function showAdOverlay(type) {
  const overlay = document.getElementById('adOverlay');
  const content = document.getElementById('adOverlayContent');
  // Apply lang from URL param if present (for EN quiz completing -> EN result page)
  // Determine language from URL param (quiz passes ?lang=en or ?lang=zh)
  var urlLang = new URLSearchParams(window.location.search).get('lang') || 'zh';
  var lang = (urlLang === 'en') ? 'en' : 'zh';
  // Sync with I18N if available
  if (typeof I18N !== 'undefined' && I18N.setLang) {
    I18N.setLang(lang);
  }

  if (type === 'qr') {
    content.innerHTML = `
      <div class="ad-overlay-title">📱 ${lang==='en'?'Share to Timeline':'分享到朋友圈'}</div>
      <div class="ad-overlay-desc">${lang==='en'?'Long press QR code to save to album':'长按识别二维码保存到相册'}</div>
      <div class="ad-overlay-qr" id="qrTarget"></div>
      <div class="ad-overlay-note">${lang==='en'?'Screenshot and share with friends':'截图保存，发给朋友测试效果更好'}</div>
    `;
    overlay.classList.add('show');
    setTimeout(function() {
      var target = document.getElementById('qrTarget');
      var quizUrl = getShareUrl(type);
      if (target && typeof QRCode !== 'undefined') { target.innerHTML = ''; new QRCode(target, { text: quizUrl, width: 160, height: 160, colorDark: "#000000", colorLight: "#ffffff" }); }
    }, 50);
  } else if (type === 'save') {
    content.innerHTML = `
      <div class="ad-overlay-title">📥 ${lang==='en'?'Save Image':'保存图片'}</div>
      <div class="ad-overlay-desc">${lang==='en'?'Generate your exclusive share card':'生成你的专属分享图'}</div>
      <button class="ad-overlay-btn" onclick="closeAdOverlay();downloadCard()">${lang==='en'?'Generate & Save':'立即生成并保存'}</button>
      <div class="ad-overlay-note">${lang==='en'?'Image includes your animal type, shareable to Moments':'图片包含你的动物类型，可直接发朋友圈'}</div>
    `;
    overlay.classList.add('show');
  } else if (type === 'wechat') {
    content.innerHTML = `
      <div class="ad-overlay-title">💬 ${lang==='en'?'Share with Friends':'分享给好友'}</div>
      <div class="ad-overlay-desc">${lang==='en'?'Copy link and send to friends':'复制链接发给好友'}</div>
      <div class="ad-overlay-url" id="shareUrlText"></div>
      <button class="ad-overlay-btn" onclick="copyShareUrl()">📋 ${lang==='en'?'Copy Link':'复制链接'}</button>
      <div style="margin-top:0.8rem">
        <div class="ad-overlay-qr" id="qrTarget2"></div>
      </div>
      <div class="ad-overlay-note">${lang==='en'?'Long press QR code to save and share':'长按二维码保存图片发朋友圈'}</div>
    `;
    overlay.classList.add('show');
    setTimeout(function() {
      document.getElementById('shareUrlText').textContent = getShareUrl('wechat');
      var target = document.getElementById('qrTarget2');
      var quizUrl = getShareUrl(type);
      if (target && typeof QRCode !== 'undefined') { target.innerHTML = ''; new QRCode(target, { text: quizUrl, width: 140, height: 140, colorDark: "#000000", colorLight: "#ffffff" }); }
    }, 0);
  }
}

function closeAdOverlay() {
  document.getElementById('adOverlay').classList.remove('show');
}

function copyShareUrl() {
  var lang = I18N ? I18N.getLang() : 'zh';
  var url = document.getElementById('shareUrlText') ? document.getElementById('shareUrlText').textContent : getShareUrl('wechat');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      alert(lang==='en' ? 'Link copied! Paste and send to friends.' : '链接已复制！粘贴发送给好友');
    }).catch(function() {
      prompt(lang==='en' ? 'Link (Ctrl+C to copy):' : '链接（Ctrl+C复制）：', url);
    });
  } else {
    prompt(lang==='en' ? 'Link (Ctrl+C to copy):' : '链接（Ctrl+C复制）：', url);
  }
}

function downloadCard() {
  var lang = I18N ? I18N.getLang() : 'zh';
  const card = document.getElementById('shareCard');
  if (!card) return;
  if (typeof html2canvas !== 'undefined') {
    html2canvas(card, { scale: 2, backgroundColor: null }).then(canvas => {
      const link = document.createElement('a');
      link.download = (lang==='en' ? 'MyAnimalPersonality_' : '我的动物人格_') + ((window._animalResult && window._animalResult.animal) ? window._animalResult.animal.name : (result.animal ? result.animal.name : 'Test')) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  } else {
    alert(lang==='en' ? 'Screenshot ready, long press card to save directly' : '截图功能已就绪，长按卡片可直接保存');
  }
}

function showAlert(msg, type) {
  const el = document.getElementById('alertBar');
  el.textContent = msg;
  el.className = 'alert-bar show ' + type;
  setTimeout(()=>{ el.className = 'alert-bar'; }, 3000);
}

function closeAuthModal(){document.getElementById('authModal').classList.remove('show')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeAuthModal()});
function doModalLogin(){var u=document.getElementById('loginUsername').value.trim();var p=document.getElementById('loginPassword').value;var e=document.getElementById('loginErr');e.textContent='';if(!u||!p){e.textContent='请填写账号和密码';return}fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(!d.success){e.textContent=d.error||'登录失败';return}CURRENT_USER=d.user;USER_TOKEN=d.token;localStorage.setItem('fbti_token',USER_TOKEN);localStorage.setItem('fbti_user',JSON.stringify(CURRENT_USER));closeAuthModal();onUserLoggedIn()}).catch(function(){e.textContent='网络错误'})}
function doModalRegister(){var u=document.getElementById('regUsername').value.trim();var p=document.getElementById('regPassword').value;var n=document.getElementById('regName').value.trim();var c=document.getElementById('regCity').value.trim();var g=document.getElementById('regGender').value;var ph=document.getElementById('regPhone').value.trim();var qq=document.getElementById('regQQ').value.trim();var wc=document.getElementById('regWechat').value.trim();var e=document.getElementById('regErr');var s=document.getElementById('regSuccess');e.textContent='';s.style.display='none';if(!u||!p){e.textContent='账号和密码为必填项';return}if(p.length<6){e.textContent='密码至少6位';return}var btn=document.querySelector('#formReg .form-submit');btn.disabled=true;fetch(API_BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,name:n,city:c,gender:g,phone:ph,qq:qq,wechat:wc})}).then(function(r){return r.json()}).then(function(d){btn.disabled=false;if(!d.success){e.textContent=d.error||'注册失败';return}s.textContent='注册成功！';s.style.display='block';CURRENT_USER=d.user;USER_TOKEN=d.token;localStorage.setItem('fbti_token',USER_TOKEN);localStorage.setItem('fbti_user',JSON.stringify(CURRENT_USER));setTimeout(function(){closeAuthModal();onUserLoggedIn()},1200)}).catch(function(){btn.disabled=false;e.textContent='网络错误'})}
function validateSession(){if(!USER_TOKEN)return;fetch(API_BASE+'/api/auth/me',{headers:{'X-User-Token':USER_TOKEN}}).then(function(r){return r.json()}).then(function(d){if(d.user){CURRENT_USER=d.user;onUserLoggedIn()}else{USER_TOKEN='';localStorage.removeItem('fbti_token');localStorage.removeItem('fbti_user')}}).catch(function(){})}
function onUserLoggedIn(){var g=document.getElementById('commentGuest');var li=document.getElementById('commentLoggedIn');var lbl=document.getElementById('commentUserLabel');if(g&&li){g.style.display='none';li.style.display='block';if(lbl&&CURRENT_USER)lbl.textContent='欢迎，'+(CURRENT_USER.name||CURRENT_USER.username)}var ta=document.getElementById('commentText');if(ta)ta.placeholder='分享你的测试感受...'}
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadComments(){fetch(API_BASE+'/api/comments').then(function(r){return r.json()}).then(function(d){var list=document.getElementById('commentList');var count=document.getElementById('commentCount');if(!list)return;var cs=d.comments||[];if(count)count.textContent='('+cs.length+')';if(cs.length===0){list.innerHTML='<div style="text-align:center;color:#475569;padding:1rem">还没有留言，来做第一个吧！</div>';return}list.innerHTML=cs.map(function(c){var dt=new Date(c.createdAt);var t=dt.toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'});return'<div class="comment-item"><div class="comment-meta">'+escHtml(c.name||c.username)+'</div><div class="comment-text">'+escHtml(c.text).replace(/\n/g,'<br>')+'</div><div class="comment-time">'+t+'</div></div>'}).join('')}).catch(function(){var list=document.getElementById('commentList');if(list)list.innerHTML='<div style="text-align:center;color:#475569;padding:1rem">加载失败</div>'})}
function submitComment(){var t=document.getElementById('commentText').value.trim();var m=document.getElementById('commentMsg');m.textContent='';m.className='comment-msg';if(!t||t.length<2){m.textContent='留言内容至少2个字';m.classList.add('err');return}if(!USER_TOKEN){m.textContent='请先登录';m.classList.add('err');openAuthModal('login');return}m.textContent='发布中...';fetch(API_BASE+'/api/comments',{method:'POST',headers:{'Content-Type':'application/json','X-User-Token':USER_TOKEN},body:JSON.stringify({text:t})}).then(function(r){return r.json()}).then(function(d){if(!d.success){m.textContent=d.error||'发布失败';m.classList.add('err');return}m.textContent='发布成功！';m.classList.add('ok');document.getElementById('commentText').value='';loadComments()}).catch(function(){m.textContent='网络错误';m.classList.add('err')})}
document.addEventListener('DOMContentLoaded',function(){loadComments();validateSession();if(USER_TOKEN&&CURRENT_USER)onUserLoggedIn()});
</script>
