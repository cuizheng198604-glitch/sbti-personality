<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SBTI × Big Five</title>
<script src="lang.js"></script>
<style>
  body { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0f0f1a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 1rem; }
  .lang-switch { position: fixed; top: 1rem; right: 1rem; }
  .lang-btn { background: #1a1a2e; border: 1px solid #2d2d4a; color: #64748b; border-radius: 8px; padding: 0.4rem 0.8rem; font-size: 0.78rem; cursor: pointer; }
  .lang-btn:hover { border-color: #f59e0b; color: #f59e0b; }
  a { color: #60a5fa; text-decoration: none; font-size: 1.1rem; }
  .cards { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
  .card { background: #1a1a2e; border: 1px solid #2d2d4a; border-radius: 12px; padding: 1rem 1.5rem; text-align: center; transition: transform 0.2s; min-width: 160px; }
  .card:hover { transform: translateY(-3px); }
  .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
  .card-desc { font-size: 0.8rem; color: #64748b; }
  .card-link { display: block; margin-top: 0.5rem; color: #60a5fa; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn" onclick="switchLang('zh')">中文</button>
  <button class="lang-btn" onclick="switchLang('en')">EN</button>
</div>

<div style="text-align:center">
  <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.3rem" data-i18n="home_title">SBTI × Big Five</div>
  <div style="color:#64748b;font-size:0.9rem" data-i18n="home_subtitle">人格测试系统</div>
</div>

<div class="cards">
  <div class="card">
    <div class="card-title" data-i18n="home_card1_title">人格测试</div>
    <div class="card-desc" data-i18n="home_card1_desc">36题情境问卷</div>
    <a class="card-link" href="personality_test.html" data-i18n="home_card1_link">开始测试 →</a>
  </div>
  <div class="card">
    <div class="card-title" data-i18n="home_card2_title">手动评估</div>
    <div class="card-desc" data-i18n="home_card2_desc">滑块输入 + 报告</div>
    <a class="card-link" href="personality_eval.html" data-i18n="home_card2_link">立即体验 →</a>
  </div>
  <div class="card">
    <div class="card-title" data-i18n="home_card3_title">抽卡模拟</div>
    <div class="card-desc" data-i18n="home_card3_desc">Gacha 风格</div>
    <a class="card-link" href="gacha_frontend.html" data-i18n="home_card3_link">开始抽卡 →</a>
  </div>
</div>

<script>
function switchLang(lang) {
  I18N.setLang(lang);
  // 更新 URL 参数
  var url = new URL(window.location.href);
  url.searchParams.set('lang', lang);
  window.history.replaceState({}, '', url);
}
I18N.applyLang();
</script>
</body>
</html>
