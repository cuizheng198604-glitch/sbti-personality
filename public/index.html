<script>
var _txt = {
 zh: {
   h1: '🐾 动物性格测试',
   subtitle: 'SBTI × Big Five · 发现你的动物人格',
   card1: ['动物性格测试','38题测出你的动物人格','立即测试 →'],
   card2: ['人格测试','36题情境问卷','开始测试 →'],

   card5: ['世界杯球队 × 动物人格','每支球队有独特的动物人格 🐾','立即查看 →']
 },
 en: {
   h1: '🐾 Animal Personality Test',
   subtitle: 'SBTI × Big Five · Discover Your Animal Archetype',
   card1: ['Animal Personality Test','38 questions to find your animal','Take Test →'],
   card2: ['Personality Test','36 situational questions','Start Test →'],
   card3: ['Manual Assessment','Slider input + full report','Try Now →'],
   card4: ['Gacha Simulator','Gacha-style experience','Draw Now →'],
   card5: ['World Cup Teams × Animal Archetype','Every team has a unique animal personality','View Now →']
 }
};

function switchLang(lang) {
 var url = new URL(window.location.href);
 url.searchParams.set('lang', lang);
 window.history.replaceState({}, '', url);
 applyLang(lang);
  // Highlight active button
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});
  var btn = document.querySelector('.lang-btn[onclick*="'+lang+'"]');
  if(btn) btn.classList.add('active');
}
function applyLang(lang) {
 var t = _txt[lang] || _txt.zh;
 document.getElementById('main-h1').textContent = t.h1;
 document.getElementById('main-subtitle').textContent = t.subtitle;
 for (var i = 1; i <= 5; i++) {
   var c = t['card' + i];
   document.getElementById('card' + i + '-title').textContent = c[0];
   document.getElementById('card' + i + '-desc').textContent = c[1];
   document.getElementById('card' + i + '-link').textContent = c[2];
 }
 document.querySelectorAll('[data-lang-preserve]').forEach(function(el) {
   var href = el.getAttribute('href') || '';
   var hash = href.indexOf('#');
   var hashStr = hash >= 0 ? href.substring(hash) : '';
   var baseAndQuery = hash >= 0 ? href.substring(0, hash) : href;
   var qIdx = baseAndQuery.indexOf('?');
   var base = qIdx >= 0 ? baseAndQuery.substring(0, qIdx) : baseAndQuery;
   var query = qIdx >= 0 ? baseAndQuery.substring(qIdx + 1) : '';
   // Remove existing lang= and utm_ params
   query = query.split('&').filter(function(p) {
     return p.indexOf('lang=') !== 0 && p.indexOf('utm_') !== 0 && p.length > 0;
   }).join('&');
   var newHref = base + (query.length > 0 ? '?' + query + '&' : '?') + 'lang=' + lang + hashStr;
   el.setAttribute('href', newHref);
 });;
}
document.addEventListener('DOMContentLoaded', function() {
 var lang = new URL(window.location.href).searchParams.get('lang') || 'zh'; try { document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')}); var lb = document.querySelector('.lang-btn[onclick*="'+lang+'"]'); if(lb) lb.classList.add('active'); } catch(e){};
 applyLang(lang);
 // Add lang param to data-lang-preserve links
 document.querySelectorAll('[data-lang-preserve]').forEach(function(el) {
   var href = el.getAttribute('href');
   if (href && !href.includes('lang=')) {
     var sep = href.includes('?') ? '&' : '?';
     el.setAttribute('href', href + sep + 'lang=' + lang);
   }
 });
});
</script>
