<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTI人格测试</title>
<style>
:root{--bg:#0f0f1a;--panel:#13132a;--card:#1a1a2e;--border:#2d2d4a;--text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;--primary:#3b82f6;--accent:#9333ea;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none}
body{font-family:Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ========== 封面 ========== */
#startScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.start-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:2.5rem 2rem;max-width:560px;width:100%;text-align:center}
.start-title{font-size:1.8rem;font-weight:900;background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem}
.start-subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem}
.start-desc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:left;color:var(--dim);font-size:0.82rem;line-height:1.9;margin-bottom:1.5rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1.5rem;text-align:left}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem}
.info-n{font-size:0.7rem;color:var(--muted);margin-bottom:0.15rem}
.info-v{font-size:0.88rem;font-weight:700;color:#60a5fa}
.btn-group{display:flex;flex-direction:column;gap:0.6rem}
.btn-start{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;padding:0.8rem 2rem;letter-spacing:0.05em;transition:opacity 0.2s,transform 0.1s}
.btn-start:hover{opacity:0.88}
.btn-start:active{transform:scale(0.97)}
.btn-caution{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:0.6rem 2rem;font-size:0.85rem;cursor:pointer;transition:all 0.15s}
.btn-caution:hover{background:#2d2d4a;color:var(--text)}
.start-links{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:0.78rem;color:var(--muted);display:flex;justify-content:center;gap:1.5rem}
.start-links a{color:var(--muted);text-decoration:none}
.start-links a:hover{color:var(--primary)}

/* ========== 答题页 ========== */
#quizScreen{display:none;min-height:100vh}
.quiz-header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:10}
.qh-title{font-size:0.82rem;font-weight:700;color:var(--muted);letter-spacing:0.08em}
.progress-wrap{flex:1;max-width:400px}
.pg-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pg-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:3px;transition:width 0.4s}
.pg-text{font-size:0.68rem;color:var(--muted);text-align:right;margin-top:0.18rem}
.quiz-body{padding:1.8rem 1.5rem;max-width:700px;margin:0 auto}
.q-block{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:1.3rem;margin-bottom:1rem;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.q-meta{font-size:0.66rem;color:var(--muted);margin-bottom:0.5rem;letter-spacing:0.05em}
.q-text{font-size:0.95rem;color:var(--text);line-height:1.75;margin-bottom:1rem}
.q-opts{display:flex;flex-direction:column;gap:0.5rem}
.q-opt{display:flex;align-items:center;gap:0.8rem;padding:0.65rem 0.9rem;border:1px solid var(--border);background:var(--card);border-radius:10px;color:var(--muted);font-size:0.85rem;cursor:pointer;transition:all 0.15s;user-select:none}
.q-opt:hover{border-color:#3b82f6;color:var(--text)}
.q-opt.selected{border-color:#3b82f6;background:rgba(59,130,246,0.1);color:#60a5fa;font-weight:600}
.q-opt .ol{font-size:1rem;font-weight:700;flex-shrink:0;width:24px;text-align:center}
.nav-row{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-next{padding:0.6rem 2rem;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.2s}
.btn-next:hover{opacity:0.88}
.btn-next:disabled{opacity:0.4;cursor:not-allowed}
.btn-back{padding:0.6rem 1.2rem;background:#1e293b;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:0.9rem;cursor:pointer;transition:all 0.15s}
.btn-back:hover{background:#2d3a4f;color:var(--text)}
.ad-container{margin:1.5rem auto;max-width:700px;text-align:center}
</style>
</head>
<body>

<!-- ========== 封面页 ========== -->
<div id="startScreen">
  <div class="start-card">
    <h1 class="start-title" id="startTitle">MBTI已经过时，SBTI新的来了。</h1>
    <p class="start-subtitle" id="startSubtitle">31道题，测出你的真实人格类型</p>
    <div class="start-desc">
      <strong>SBTI</strong>是基于<strong>MBTI</strong>升级的全新人格测试，融入<strong>Big Five</strong>五维度评估体系，让你对自己有更精准的认知。<br><br>
      题目无对错，请根据你的第一直觉选择。
    </div>
    <div class="info-grid">
      <div class="info-item"><div class="info-n">题目数</div><div class="info-v" id="infoCount">31题</div></div>
      <div class="info-item"><div class="info-n">预计用时</div><div class="info-v">5-8分钟</div></div>
      <div class="info-item"><div class="info-n">结果类型</div><div class="info-v">16种</div></div>
      <div class="info-item"><div class="info-n">准确度</div><div class="info-v">科学验证</div></div>
    </div>
    <div class="btn-group">
      <button class="btn-start" onclick="startQuiz()">开始测试</button>
      <button class="btn-caution" onclick="startQuiz()">慎点</button>
      <button class="btn-caution" onclick="startQuiz()">都不信</button>
    </div>
    <div class="start-links" id="startLinks">
      <a href="#" onclick="showAbout()">关于测试</a>
      <a href="#" onclick="showPrivacy()">隐私说明</a>
    </div>
  </div>
</div>

<!-- ========== 答题页 ========== -->
<div id="quizScreen">
  <div class="quiz-header">
    <div class="qh-title">SBTI</div>
    <div class="progress-wrap">
      <div class="pg-bar"><div class="pg-fill" id="pgFill" style="width:0%"></div></div>
      <div class="pg-text" id="pgText">0 / 31</div>
    </div>
    <button class="btn-back" onclick="confirmExit()">退出</button>
  </div>
  <div class="quiz-body" id="quizBody">
    <!-- 题目动态渲染 -->
  </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>
<script src="ads.js"></script>

// ========== 状态 ==========
let currentQ = 0;
let answers = {};
const total = QUESTIONS.length;

// ========== 初始化 ==========
function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('infoCount').textContent = total + '题';
  showQuestion(0);
}

function showQuestion(index) {
  currentQ = index;
  const q = QUESTIONS[index];
  const body = document.getElementById('quizBody');

  // 更新进度
  document.getElementById('pgFill').style.width = ((index + 1) / total * 100) + '%';
  document.getElementById('pgText').textContent = `${index + 1} / ${total}`;

  // 渲染题目
  body.innerHTML = `
    <div class="q-block" id="qBlock">
      <div class="q-meta">${q.section} · 第${index + 1}题</div>
      <div class="q-text">${q.text}</div>
      <div class="q-opts">
        ${q.opts.map((o, i) => `
          <div class="q-opt" onclick="selectOpt(${i}, ${o.s})">
            <span class="ol">${o.l}</span>
            <span>${o.t}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="ad-container" id="qAdContainer"></div>
    <div class="nav-row">
      ${index > 0 ? '<button class="btn-back" onclick="prevQ()">上一题</button>' : ''}
      <button class="btn-next" id="nextBtn" onclick="nextQ()" disabled>${index === total - 1 ? '查看结果' : '下一题'}</button>
    </div>
  `;

  // 恢复已选答案
  if (answers[index] !== undefined) {
    const opts = document.querySelectorAll('.q-opt');
    opts.forEach((opt, i) => {
      if (q.opts[i].s === answers[index]) {
        opt.classList.add('selected');
        document.getElementById('nextBtn').disabled = false;
      }
    });
  }

  // 每5题插广告
  if ((index + 1) % 5 === 0 && index < total - 1) {
    adManager.init();
    adManager.showAd(document.getElementById('qAdContainer'), 'inQuiz');
  }
}

function selectOpt(index, score) {
  const q = QUESTIONS[currentQ];
  answers[currentQ] = score;

  const opts = document.querySelectorAll('.q-opt');
  opts.forEach((o, i) => {
    o.classList.toggle('selected', i === index);
  });

  document.getElementById('nextBtn').disabled = false;
}

function nextQ() {
  if (currentQ < total - 1) {
    showQuestion(currentQ + 1);
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) showQuestion(currentQ - 1);
}

function confirmExit() {
  if (confirm('确定要退出吗？进度将不会保存。')) {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
  }
}

// ========== 结果 ==========
function showResult() {
  // 计算结果
  const result = scoringEngine.calc(answers, QUESTIONS);

  // 编码结果用于URL参数
  const scoresEncoded = btoa(JSON.stringify(result.allDimensions));
  const resultURL = `result.html?type=${result.type}&match=${result.matchPercent}&scores=${scoresEncoded}`;

  // 提交到后端（可选）
  if (CONFIG.submit?.endpoint) {
    fetch(CONFIG.submit.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result)
    }).catch(() => {});
  }

  // 跳转到结果页
  window.location.href = resultURL;
}

function showAbout() { alert('本测试基于MBTI + Big Five人格理论改编，仅供娱乐。'); }
function showPrivacy() { alert('我们不会收集任何个人信息，测试结果仅存储在本地。'); }
</script>
